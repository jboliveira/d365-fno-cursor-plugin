<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none" role="img" aria-label="D365 F&amp;O X++">
  <defs>
    <linearGradient id="bg" x1="16" y1="8" x2="112" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0078D4"/>
      <stop offset="55%" stop-color="#0063B1"/>
      <stop offset="100%" stop-color="#004578"/>
    </linearGradient>
    <linearGradient id="accent" x1="78" y1="28" x2="108" y2="58" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7EEAFF"/>
      <stop offset="100%" stop-color="#00BCF2"/>
    </linearGradient>
    <linearGradient id="glow" x1="64" y1="36" x2="64" y2="92" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#002B4F" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- App icon canvas -->
  <rect width="128" height="128" rx="28" fill="url(#bg)"/>
  <ellipse cx="64" cy="52" rx="46" ry="34" fill="url(#glow)"/>

  <!-- CoC / extension brackets -->
  <path d="M34 46 L24 64 L34 82" stroke="url(#accent)" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M94 46 L104 64 L94 82" stroke="url(#accent)" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Chain-of-command arc -->
  <path d="M28 90 C44 104 84 104 100 90" stroke="#FFFFFF" stroke-opacity="0.18" stroke-width="2.5" stroke-linecap="round"/>

  <!-- X mark -->
  <g filter="url(#soft)">
    <path d="M52 42 L64 58 L76 42 L82 48 L68 64 L82 80 L76 86 L64 70 L52 86 L46 80 L60 64 L46 48 Z" fill="#FFFFFF"/>
  </g>

  <!-- ++ badge -->
  <rect x="78" y="24" width="34" height="22" rx="11" fill="#FFFFFF" fill-opacity="0.12"/>
  <text x="95" y="40" text-anchor="middle" font-family="Segoe UI, system-ui, -apple-system, sans-serif" font-size="15" font-weight="700" fill="url(#accent)">++</text>

  <!-- F&amp;O label -->
  <rect x="36" y="96" width="56" height="20" rx="10" fill="#FFFFFF" fill-opacity="0.14"/>
  <text x="64" y="110" text-anchor="middle" font-family="Segoe UI, system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#FFFFFF" letter-spacing="1.4">F&amp;O</text>
</svg>
